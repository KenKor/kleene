name: Publish NuGet

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' ./src/kleenelogic/kleenelogic.csproj | head -n 1)"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Unable to determine package version."
            exit 1
          fi

          echo "PACKAGE_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "Using package version: ${VERSION}"

      - name: Restore
        run: dotnet restore ./kleene.sln

      - name: Build
        run: dotnet build ./kleene.sln -c Release --no-restore /p:Version="${{ env.PACKAGE_VERSION }}"

      - name: Test
        run: dotnet test ./kleene.sln -c Release --no-build

      - name: Pack (library only)
        run: dotnet pack ./src/kleenelogic/kleenelogic.csproj -c Release --no-build -o ./artifacts /p:PackageVersion="${{ env.PACKAGE_VERSION }}"

      - name: Publish
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
